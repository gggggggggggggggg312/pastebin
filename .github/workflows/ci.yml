name: Universal CI

on:
  push:
  pull_request:

jobs:
  sanity:
    name: Sanity Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Basic repo checks
        run: |
          echo "Checking repo..."
          test -d .github || echo "No CI config folder"
          find . -type f -name "*.tmp" && exit 1 || echo "No temp files"

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: sanity

    steps:
      - uses: actions/checkout@v4

      # small improvement: caching placeholder (works even if no deps exist)
      - name: Cache workspace
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-cache-${{ github.sha }}

      - name: Run tests if available
        run: |
          if [ -f test.sh ]; then
            chmod +x test.sh
            ./test.sh
          else
            echo "No tests found"
          fi

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create build package
        run: |
          echo "Packaging repo..."
          mkdir -p dist
          tar -czf dist/build-${{ github.sha }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
