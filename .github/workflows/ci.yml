name: Universal CI

on:
  push:
  pull_request:

jobs:
  sanity:
    name: Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3

      - name: Show repository structure
        run: ls -R

      - name: Basic repo validation
        run: |
          echo "Checking repo..."

          if [ -d ".github" ]; then
            echo "✅ CI config folder exists"
          else
            echo "⚠️ No .github folder found"
          fi

      - name: Check for temp files
        run: |
          echo "Checking for temp files..."

          count=$(find . -type f -name "*.tmp" | wc -l)

          if [ "$count" -gt 0 ]; then
            echo "❌ Found $count temp file(s)"
            exit 1
          else
            echo "✅ No temp files"
          fi

  test:
    name: Optional Test Stage
    runs-on: ubuntu-latest
    needs: sanity

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3

      - name: Run test script (if exists)
        run: |
          if [ -f test.sh ]; then
            echo "Running test.sh..."
            chmod +x test.sh
            ./test.sh
          else
            echo "ℹ️ No test.sh found, skipping tests"
          fi

  package:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3

      - name: Create build directory
        run: mkdir -p dist

      - name: Package repository
        run: |
          echo "Packaging repository..."

          tar -czf dist/build-${{ github.sha }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
