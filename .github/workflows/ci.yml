name: Universal CI

on:
  push:
  pull_request:

jobs:
  sanity:
    name: Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -R

      - name: Check for .github folder
        run: |
          echo "Checking repo..."
          if [ -d ".github" ]; then
            echo "✅ CI config folder exists"
          else
            echo "⚠️ No CI config folder"
          fi

      - name: Check for temp files (SAFE VERSION)
        run: |
          echo "Checking for temp files..."
          count=$(find . -type f -name "*.tmp" | wc -l)

          if [ "$count" -gt 0 ]; then
            echo "❌ Found $count temp file(s)"
            exit 1
          else
            echo "✅ No temp files"
          fi

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: sanity

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run test script if exists
        run: |
          if [ -f test.sh ]; then
            chmod +x test.sh
            ./test.sh
          else
            echo "ℹ️ No test.sh found, skipping tests"
          fi

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create build package
        run: |
          echo "Packaging repo..."
          mkdir -p dist
          tar -czf dist/build-${{ github.sha }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
